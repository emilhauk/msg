{{define "base.html"}}<!doctype html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>{{block "title" .}}msg.{{end}}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png?v={{.BuildVersion}}">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#5865f2">
  <meta name="apple-mobile-web-app-title" content="msg.">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="/static/style.css?v={{.BuildVersion}}">
  <link rel="stylesheet" href="/static/chroma.css?v={{.BuildVersion}}">
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2/dist/htmx.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/htmx-ext-sse@2/sse.js" defer></script>
  <script type="module">
    import { Database } from 'https://cdn.jsdelivr.net/npm/emoji-picker-element/+esm';
    // Expose Database so room-page module scripts can instantiate it without
    // re-importing the same URL (which would be a separate module instance).
    window.__EmojiDatabase = Database;
  </script>
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a href="/" class="site-header__logo" aria-label="msg.">
        <svg class="logo" viewBox="0 0 64 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <!-- Speech-bubble icon -->
          <rect class="logo__bubble" x="0" y="4" width="22" height="16" rx="4"/>
          <circle class="logo__dot" cx="5.5"  cy="12" r="1.75"/>
          <circle class="logo__dot" cx="11"   cy="12" r="1.75"/>
          <circle class="logo__dot" cx="16.5" cy="12" r="1.75"/>
          <path class="logo__tail" d="M4 20 L2 24 L9 20" stroke-linejoin="round"/>
          <!-- Wordmark: "msg." -->
          <text class="logo__wordmark" x="27" y="19" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" letter-spacing="-0.03em">msg.</text>
        </svg>
      </a>
      <button id="update-hint" class="update-hint" hidden onclick="window.location.reload()" aria-label="Update available — click to reload">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Update available
      </button>
      {{block "header-right" .}}{{end}}
    </div>
  </header>

  <main class="site-main">
    {{block "content" .}}{{end}}
  </main>

  {{/* Emoji picker lives outside swappable regions */}}
  <div id="emoji-picker-container" hidden>
    <emoji-picker></emoji-picker>
  </div>

  <script src="/static/app.js?v={{.BuildVersion}}"></script>
</body>
</html>
{{end}}
